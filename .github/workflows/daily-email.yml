name: Daily New Yorker Email

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: normal | backfill N | latest'
        required: false
        default: 'normal'
        type: string
      days:
        description: 'Days back (used when mode=backfill, e.g. 1)'
        required: false
        default: '1'
        type: string

env:
  kimi_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  BAIDU_API_KEY: ${{ secrets.BAIDU_API_KEY }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily task
        run: |
          MODE="${{ github.event.inputs.mode || ''normal'' }}"
          if [ "$MODE" = "latest" ]; then
            python daily_task.py latest
          elif [ "$MODE" = "backfill" ]; then
            python daily_task.py backfill ${{ github.event.inputs.days || ''1'' }}
          else
            python daily_task.py
          fi