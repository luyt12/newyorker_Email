name: Daily New Yorker Email

on:
  schedule:
    - cron: '0 0 29 2 *'  # Disabled - Feb 29 only (effectively never)
  workflow_dispatch:

env:
  KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore processed_urls cache
        uses: actions/cache@v4
        with:
          path: processed_urls.json
          key: newyorker-processed-${{ github.run_id }}
          restore-keys: |
            newyorker-processed-

      - run: pip install -r requirements.txt

      - name: Run daily task
        run: python daily_task.py

      - name: Save processed_urls cache
        uses: actions/cache/save@v4
        with:
          path: processed_urls.json
          key: newyorker-processed-${{ github.run_id }}
